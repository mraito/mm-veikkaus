  animation:toastin .22s ease-out, toastout .4s ease-in 1.8s forwards}
.toast.err{background:var(--red);color:#2a0a08}
@keyframes toastin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, Fragment } = React;

/* ===================== TALLENNUSVAHVISTUS (TOAST) ===================== */
let toastListeners=[];
function toast(text,kind){ toastListeners.forEach(fn=>fn(text,kind)); }
function Toast(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    const fn=(text,kind)=>{ const id=Date.now()+"_"+Math.random();
      setItems(a=>[...a,{id,text,kind:kind||""}]);
      setTimeout(()=>setItems(a=>a.filter(x=>x.id!==id)),2200);
    };
    toastListeners.push(fn);
    return ()=>{ toastListeners=toastListeners.filter(f=>f!==fn); };
  },[]);
  if(items.length===0) return null;
  return <div className="toastwrap">{items.map(t=><div key={t.id} className={"toast"+(t.kind==="err"?" err":"")}>{t.text}</div>)}</div>;
}

function matchPoints(pred,m){

  if(sign(ph-pa)===sign(ah-aa)){ const hits=(ph===ah?1:0)+(pa===aa?1:0); base=hits===2?5:hits===1?4:3; }

  return teamTotalWins(team,matches,teamstats)*WIN_POINTS+(t.champ?CHAMP_POINTS:0); }

/* ===================== LASKURI ===================== */
function Countdown(){
  const target=useMemo(()=>{ const d=FIXTURES.reduce((a,b)=>a.date<b.date?a:b).date; return new Date(d+"T00:00:00").getTime(); },[]);
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const diff=target-now;
  if(diff<=0) return <div className="countdown"><div className="cdbox"><div className="cdnum">⚽</div><div className="cdlab">Käynnissä</div></div></div>;
  const s=Math.floor(diff/1000), d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), ss=s%60;
  const pad=n=>String(n).padStart(2,"0");
  return (<div className="countdown">
    <div className="cdbox"><div className="cdnum">{d}</div><div className="cdlab">päivää</div></div>
    <div className="cdbox"><div className="cdnum">{pad(h)}</div><div className="cdlab">tuntia</div></div>
    <div className="cdbox"><div className="cdnum">{pad(m)}</div><div className="cdlab">min</div></div>
    <div className="cdbox"><div className="cdnum">{pad(ss)}</div><div className="cdlab">sek</div></div>
  </div>);
}

function App(){
  const [tab,setTab]=useState("veikkaus");
  const [detail,setDetail]=useState(null);
  const [matches,setMatches]=useState(null);
  const [config,setConfig]=useState({locked:false,pin:"",stake:10});
  const [teamstats,setTeamstats]=useState({});
  const [playerstats,setPlayerstats]=useState({});
  const [preds,setPreds]=useState({});
  const [err,setErr]=useState("");

  useEffect(()=>{
    if(!cfgOk) return;
    const subs=[];
    subs.push(docRef("matches").onSnapshot(d=>{
      const lst=d.exists?(d.data().list||[]):null;
      if(!lst||!lst[0]||!lst[0].date){ const sd=buildSeedMatches(); docRef("matches").set({list:sd}).catch(e=>setErr(e.message)); setMatches(sd); }
      else setMatches(lst);
    },e=>setErr(e.message)));
    subs.push(docRef("config").onSnapshot(d=>{ if(d.exists) setConfig({locked:false,pin:"",stake:10,...d.data()}); },e=>setErr(e.message)));
    subs.push(docRef("teamstats").onSnapshot(d=>{ setTeamstats(d.exists?(d.data().map||{}):{}); }));
    subs.push(docRef("playerstats").onSnapshot(d=>{ setPlayerstats(d.exists?(d.data().map||{}):{}); }));
    subs.push(db.collection("predictions").onSnapshot(s=>{ const o={}; s.forEach(x=>o[x.id]=x.data()); setPreds(o); },e=>setErr(e.message)));
    return ()=>subs.forEach(u=>u&&u());
  },[]);

  const scores=useMemo(()=>{
    const out={}; const ms=matches||[];
    Object.entries(preds).forEach(([id,p])=>{
      let mp=0; ms.forEach(mt=>{ const pt=matchPoints(p.scores&&p.scores[mt.id],mt); if(pt) mp+=pt; });
      let pp=0; POS_ORDER.forEach(pos=>{ const pk=p.picks&&p.picks[pos];
        if(pk&&pk.name) pp+=playerPts(pos,playerstats[pkey(pk.name,pk.country)]); });
      let tp=0; if(p.team){ tp=teamPoints(p.team,ms,teamstats); }
      out[id]={mp,pp,tp,total:mp+pp+tp};
    });
    return out;
  },[preds,matches,playerstats,teamstats]);

  if(!cfgOk) return <Setup/>;
  if(matches===null) return <div className="wrap" style={{paddingTop:80}}><p className="lab">Yhdistetään tietokantaan…</p>{err&&<div className="note err">Virhe: {err}</div>}</div>;

  return (
    <div className="wrap">
      <Toast/>
      <header className="hero">
        <div className="herorow">
          <img className="logo" src={WC_LOGO} alt="FIFA World Cup 2026"/>
          <div className="htxt">
            <div className="kick">USA · KANADA · MEKSIKO — 11.6.–19.7.2026</div>
            <h1 className="title">MM-<em>VEIKKAUS</em> '26</h1>
            <p className="sub">Veikkaa alkulohkon ottelut ja kasaa unelmajoukkue. Pisteet ja tulostaulukko päivittyvät kaikille reaaliajassa.</p>
          </div>
          <Countdown/>
        </div>
      </header>
      <nav className="tabs">
        {[["veikkaus","Oma veikkaus"],["karki","Tulostaulukko"],["ottelut","Ottelut"],["jarjestaja","Järjestäjä"]].map(([k,l])=>
          <button key={k} className={"tab"+(tab===k?" on":"")} onClick={()=>setTab(k)}>{l}</button>)}
      </nav>
      {err&&<div className="note err">Tietokantavirhe: {err} — tarkista Firestore-säännöt (README vaihe 4).</div>}
      {tab==="veikkaus"&&<Veikkaus matches={matches} preds={preds} config={config} playerstats={playerstats}/>}
      {tab==="karki"&&(detail&&preds[detail]
        ? <Kortti p={preds[detail]} sc={scores[detail]} matches={matches} teamstats={teamstats} playerstats={playerstats} onBack={()=>setDetail(null)}/>
        : <Fragment>
            <PotBar count={Object.keys(preds).length} played={matches.filter(m=>m.hg!==""&&m.hg!=null).length} total={matches.length} stake={config.stake||10}/>
            {config.locked&&<Live matches={matches} preds={preds} today={todayISO()}/>}
            <Karki preds={preds} scores={scores} matches={matches} playerstats={playerstats} teamstats={teamstats} locked={config.locked} onOpen={id=>setDetail(id)} stake={config.stake||10}/>
          </Fragment>)}
      {tab==="ottelut"&&<Ottelut matches={matches} preds={preds}/>}
      {tab==="jarjestaja"&&<Admin matches={matches} preds={preds} config={config} teamstats={teamstats} playerstats={playerstats}/>}
      <p className="tiny" style={{marginTop:28,textAlign:"center"}}>

      </p>
    </div>
  );
}

function TeamPicker({value,onChange,disabled,playerstats,showPts}){
  const picks=value.picks||{};
  const [custom,setCustom]=useState({});
  const countries=POS_ORDER.map(p=>picks[p]&&picks[p].country).filter(Boolean);
  const dup = countries.length!==new Set(countries).size;
  const setField=(pos,patch)=>{ const np={...picks,[pos]:{...(picks[pos]||{name:"",country:""}),...patch}}; onChange({...value,picks:np}); };
  return (
    <div>
      <div className="grid4">
        {POS_ORDER.map(pos=>{
          const pk=picks[pos]||{name:"",country:""};
          const squad=pk.country?(SQUADS[pk.country]||null):null;
          const hasSquad=squad&&squad.length>0;
          const known=hasSquad&&squad.some(p=>p.n===pk.name);
          const isCustom=!!custom[pos];
          const pts=(showPts&&pk.name)?playerPts(pos,playerstats[pkey(pk.name,pk.country)]):null;
          const selVal=isCustom?"__custom__":(known?pk.name:(pk.name?"__own__":""));
          return (
            <div key={pos} className="card" style={{margin:0,padding:12}}>
              <div className="lab" style={{color:"var(--blue2)"}}>{POS[pos].label}</div>
              <select style={{width:"100%",marginTop:6}} disabled={disabled}
                value={pk.country||""} onChange={e=>{setField(pos,{country:e.target.value,name:""});setCustom(s=>({...s,[pos]:false}));}}>
                <option value="">— maa —</option>
                {ALL_TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              {hasSquad
                ? <select style={{width:"100%",marginTop:6}} disabled={disabled} value={selVal}
                    onChange={e=>{const v=e.target.value;
                      if(v==="__custom__"){setCustom(s=>({...s,[pos]:true}));}
                      else if(v==="__own__"){}
                      else {setField(pos,{name:v});setCustom(s=>({...s,[pos]:false}));}}}>
                    <option value="">— pelaaja —</option>
                    <optgroup label={POS[pos].label}>
                      {squad.filter(p=>p.pos===pos).map(p=><option key={p.n} value={p.n}>{p.n}</option>)}
                    </optgroup>
                    <optgroup label="Muut pelaajat">
                      {squad.filter(p=>p.pos!==pos).map(p=><option key={p.n} value={p.n}>{p.n}</option>)}
                    </optgroup>
                    {pk.name&&!known&&<option value="__own__">{pk.name} (oma)</option>}
                    <option value="__custom__">✏ Muu / kirjoita itse…</option>
                  </select>
                : null}
              {(!hasSquad||isCustom)&&
                <input style={{width:"100%",marginTop:6}} placeholder="Pelaajan nimi" disabled={disabled}
                  value={pk.name||""} onChange={e=>setField(pos,{name:e.target.value})}/>}
              <div className="tiny" style={{marginTop:6}}>Maali {POS[pos].goal}p · syöttö {POS[pos].assist}p · 0-peli {POS[pos].cs}p{pts!=null?` · nyt ${pts}p`:""}</div>
            </div>
          );
        })}
      </div>
      {dup && <div className="note warn">⚠️ Saman maan pelaajia voi valita vain yhden. Valitse pelaajat neljästä eri maasta.</div>}
      <div className="divider"/>
      <div className="lab">Mestarijoukkue (voitto {WIN_POINTS}p/ottelu, mestaruus {CHAMP_POINTS}p)</div>
      <select style={{width:"100%",marginTop:6,maxWidth:340}} disabled={disabled}
        value={value.team||""} onChange={e=>onChange({...value,team:e.target.value})}>
        <option value="">— valitse —</option>
        {ALL_TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    </div>
  );
}
const hasDupCountry=(v)=>{ const c=POS_ORDER.map(p=>v.picks&&v.picks[p]&&v.picks[p].country).filter(Boolean); return c.length!==new Set(c).size; };

function Veikkaus({matches,preds,config,playerstats}){
  const existing=Object.keys(preds).sort((a,b)=>a.localeCompare(b,"fi"));
  const [name,setName]=useState("");
  const [draft,setDraft]=useState(null);
  const [open,setOpen]=useState({"A":true});
  const [msg,setMsg]=useState("");
  const [pinFor,setPinFor]=useState(null);
  const [pinInput,setPinInput]=useState("");
  const [pinErr,setPinErr]=useState("");
  const locked=config.locked;

  const start=(n)=>{ const base=preds[nameId(n)]||{name:n,scores:{},picks:{},team:"",pin:""}; setName(n); setDraft(JSON.parse(JSON.stringify(base))); setMsg(""); };
  const requestOpen=(n)=>{ const nm=(n||"").trim(); if(!nm) return;
    const pred=preds[nameId(nm)];
    if(pred&&pred.pin&&!locked){ setPinFor(nm); setPinInput(""); setPinErr(""); }
    else start(nm); };
  const tryPin=()=>{ const pred=preds[nameId(pinFor)];
    if(pred&&String(pred.pin)===String(pinInput).trim()){ const n=pinFor; setPinFor(null); setPinInput(""); setPinErr(""); start(n); }
    else setPinErr("Väärä PIN. Yritä uudelleen."); };

    setDraft(d=>({...d,scores:{...d.scores,[id]:{...(d.scores[id]||{h:"",a:""}),[side]:val}}})); };
  const save=async()=>{
    if(!name.trim()){setMsg("Anna nimi.");return;}
    if(hasDupCountry(draft)){setMsg("Korjaa: neljä pelaajaa, neljä eri maata.");return;}
    try{ await db.collection("predictions").doc(nameId(name)).set({...draft,name:name.trim(),pin:(draft.pin||"").trim()}); setMsg(""); toast("Tallennettu ✔"); }
    catch(e){ setMsg("Virhe: "+e.message); toast("Tallennus epäonnistui","err"); }

        <button className="act" onClick={tryPin}>Avaa</button>
        <button className="ghost" onClick={()=>{setPinFor(null);setPinInput("");setPinErr("");}}>Peruuta</button>
      </div>
      {pinErr&&<div className="note warn">{pinErr} Jos olet unohtanut PIN:n, järjestäjä voi nollata sen.</div>}
    </div>
  );

  if(!draft) return (
    <div className="card">
      <div className="lab">Aloita tästä</div>
      <h2 style={{fontSize:22,margin:"6px 0 12px"}}>Kuka olet?</h2>
      <div className="lab">Uusi veikkaaja</div>
      <div className="row wrapf" style={{marginTop:6}}>
        <input placeholder="Nimesi" value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")requestOpen(name);}} style={{minWidth:200}}/>
        <button className="act" onClick={()=>requestOpen(name)}>Aloita</button>
      </div>
      {existing.length>0&&<><div className="divider"/><div className="lab">Palaatko muokkaamaan? Valitse nimesi</div>
        <div className="row wrapf" style={{marginTop:6}}>
          <select defaultValue="" onChange={e=>{const v=e.target.value; e.target.value=""; if(v)requestOpen(preds[v].name||v);}} style={{minWidth:220}}>
            <option value="">— valitse nimesi —</option>
            {existing.map(id=><option key={id} value={id}>{(preds[id].name||id)+(preds[id].pin?" 🔒":"")}</option>)}
          </select>
        </div>
        <p className="tiny" style={{marginTop:8}}>🔒 = veikkaus on suojattu PIN-koodilla.</p></>}
      {locked&&<div className="note warn">🔒 Veikkaukset on lukittu — voit katsella mutta et muokata.</div>}
    </div>
  );

  return (
    <div>
      <div className="card">
        <div className="row between wrapf">
          <div><div className="lab">Veikkaaja</div><div style={{fontSize:22,fontWeight:800}}>{name}</div></div>
          <div className="row"><button className="ghost" onClick={()=>{setDraft(null);setMsg("");}}>Vaihda nimeä</button>
            <button className="act" onClick={save} disabled={locked}>Tallenna</button></div>
        </div>
        {msg&&<div className="note" style={{marginBottom:0}}>{msg}</div>}
        {locked&&<div className="note warn">🔒 Veikkaukset on lukittu.</div>}
      </div>

      {!locked&&<div className="card">
        <div className="lab" style={{color:"var(--blue2)"}}>🔒 Oma PIN — suositeltu</div>
        <p className="tiny" style={{margin:"6px 0 10px"}}>💡 Suosittelemme PIN-koodia. Ilman sitä kuka tahansa voi avata veikkauksesi tällä nimellä ja nähdä tai muuttaa valintojasi ennen lukitusta. PIN pitää veikkauksesi omana tietonasi — aseta se nyt, niin se kysytään aina kun veikkaus avataan.</p>
        <div className="row wrapf" style={{gap:8}}>
          <input type="password" inputMode="numeric" placeholder="esim. 1234" disabled={locked}
            value={draft.pin||""} onChange={e=>setDraft(d=>({...d,pin:e.target.value}))} style={{maxWidth:160}}/>
          {(draft.pin||"").trim()
            ? <span className="tiny" style={{color:"var(--teal)"}}>PIN asetettu — muista se! Tyhjennä kenttä poistaaksesi suojan.</span>
            : <span className="tiny">Valinnainen, mutta suositeltu. Kevyt suoja kurkkimista vastaan (ei vahva salasana).</span>}
        </div>
      </div>}

      <div className="card">
        <div className="lab">Unelmajoukkue</div>

                <span className="mut">–</span>
                <input className="sc" inputMode="numeric" disabled={locked} value={p.a} onChange={e=>setScore(mt.id,"a",e.target.value)}/>
              </div>
              <div className="tm">{flag(mt.away)} {mt.away}</div>
            </div>;
          })}
        </div>
      ))}
      <div style={{textAlign:"center",margin:"18px 0"}}><button className="act" onClick={save} disabled={locked}>Tallenna veikkaus</button></div>
    </div>
  );
}

function Cell({pos,pick,teamstats,playerstats,champ,matches}){
  const country=champ?pick:(pick&&pick.country);

  const label= champ?"Mestarimaa":POS[pos].label;

  if(champ){ nm=pick||"—"; pts=pick?teamPoints(pick,matches,teamstats):0; }
  else { nm=(pick&&pick.name)||"—"; pts=(pick&&pick.name)?playerPts(pos,playerstats[pkey(pick.name,pick.country)]):0; }
  return (
    <div className={"cellbox"+(out?" out":"")}>
      <div className="nm">{country?<span className="flag">{flag(country)}</span>:null}{nm}</div>
      <div className="pts">{out?`+${pts} p · tippunut`:`+${pts} p`}</div>
    </div>
  );
}
function LockedCell(){
  return (
    <div className="cellbox" style={{display:"flex",alignItems:"center"}}>
      <div className="nm" style={{color:"var(--mut)",fontWeight:700}}>🔒 piilossa</div>
    </div>
  );
}
function eur(x){ if(x==null) return ""; const r=Math.round(x*100)/100; return (r%1===0)?(r+" €"):(r.toFixed(2).replace(".",",")+" €"); }
function computePrizes(rows,pot){ const tier=[0.6,0.3,0.1]; const n=rows.length; const res=[]; let i=0;
  while(i<n){ let j=i; while(j+1<n && rows[j+1].total===rows[i].total) j++; let sum=0; for(let p=i;p<=j;p++) sum+=(tier[p]||0)*pot; const each=sum/(j-i+1); for(let k=i;k<=j;k++) res[k]={rank:i+1,prize:each}; i=j+1; } return res; }
function PotBar({count,played,total,stake}){ const pot=count*stake; const ts=[["1",pot*0.6,60,"g"],["2",pot*0.3,30,"s"],["3",pot*0.1,10,"b"]];
  return (<div className="potbar">
    <div><div className="lab">Potti</div><div className="pottot">{eur(pot)}</div></div>
    <div className="tiers">{ts.map(([r,a,p,c])=><div key={r} className="tier"><span className={"medal "+c}>{r}</span><div><div className="teur">{eur(a)}</div><div className="tiny">{p} %</div></div></div>)}</div>
  </div>); }

function Karki({preds,scores,matches,playerstats,teamstats,locked,onOpen,stake}){
  const rows=Object.keys(preds).map(id=>({id,p:preds[id],...scores[id]})).sort((a,b)=>b.total-a.total);
  if(rows.length===0) return <div className="card"><div className="note">Ei veikkauksia vielä. Täytä omasi “Oma veikkaus” -välilehdellä!</div></div>;
  const pot=rows.length*(stake||10); const pr=computePrizes(rows,pot);
  const mcls=(rank)=>rank===1?"g":rank===2?"s":rank===3?"b":null;
  return (
    <div>
      {locked
        ? <div className="tiny" style={{margin:"-2px 4px 8px"}}>👆 Napauta veikkaajan nimeä → kaikki hänen otteluveikkauksensa ja pisteet.</div>
        : <div className="note warn">🔒 Muiden pelaaja- ja maavalinnat sekä otteluveikkaukset paljastuvat vasta kun veikkaukset on lukittu (turnauksen alkaessa) — näin kukaan ei voi kopioida toisten valintoja.</div>}

      {/* LEVEÄ PÖYTÄ */}
      <div className="card lb-wide" style={{overflowX:"auto"}}>
        <table className="lbtable">
          <thead><tr><th>#</th><th>Veikkaaja</th><th>Yht</th><th>Maalivahti</th><th>Puolustaja</th><th>Keskikenttä</th><th>Hyökkääjä</th><th>Mestarimaa</th></tr></thead>
          <tbody>
          {rows.map((r,i)=>{ const m=mcls(pr[i].rank); return (
            <tr key={r.id} className={i===0?"top":""} style={{cursor:locked?"pointer":"default"}} onClick={()=>locked&&onOpen(r.id)}>
              <td><span className={"rank"+(i===0?" gold":"")}>{pr[i].rank}</span></td>
              <td><div className="nm-tot"><span style={{fontWeight:800,fontSize:16,display:"inline-flex",alignItems:"center",gap:6}}>{r.p.name||r.id}{m&&<span className={"medal "+m}>{pr[i].rank}</span>}{locked&&<span className="chev">›</span>}</span><span className="tiny">alkulohko {r.mp} p · joukkue {r.pp+r.tp} p</span></div></td>
              <td><span className="tot" style={{color:i===0?"var(--grn)":"var(--ink)"}}>{r.total}</span></td>
              {POS_ORDER.map(pos=><td key={pos}>{locked?<Cell pos={pos} pick={r.p.picks&&r.p.picks[pos]} teamstats={teamstats} playerstats={playerstats}/>:<LockedCell/>}</td>)}
              <td>{locked?<Cell champ pick={r.p.team} teamstats={teamstats} playerstats={playerstats} matches={matches}/>:<LockedCell/>}</td>
            </tr>
          );})}
          </tbody>
        </table>
      </div>

      {/* KOMPAKTIT KORTIT */}
      <div className="lb-cards">
        {rows.map((r,i)=>{ const m=mcls(pr[i].rank); const t=r.p.team; const tout=t&&teamstats[t]&&teamstats[t].out; return (
          <div key={r.id} className={"pcard"+(i===0?" top":"")} style={{cursor:locked?"pointer":"default"}} onClick={()=>locked&&onOpen(r.id)}>
            {i===0&&<div className="bar"/>}
            <div className="chd">
              <span className={"rank"+(i===0?" gold":"")}>{pr[i].rank}</span>
              <span className="cflag" style={tout?{opacity:.4,filter:"grayscale(1)"}:null}>{locked?flag(t):<span style={{fontSize:16}}>🔒</span>}</span>
              <div className="nmcol"><span className="cname">{r.p.name||r.id}{m&&<span className={"medal "+m}>{pr[i].rank}</span>}{locked&&<span className="chev">›</span>}</span>{tout&&<div className="tiny">mestari tippunut</div>}</div>
              <div style={{textAlign:"right"}}><div className="tot" style={{fontSize:26,color:i===0?"var(--grn)":"var(--ink)"}}>{r.total}</div><div className="tiny">yhteensä</div></div>
            </div>
            <div className="jrow"><span className="jpill">Ottelut {r.mp} p</span><span className="jpill">Joukkue {r.pp+r.tp} p</span></div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ===================== LIVE-SEURANTA ===================== */
function Live({matches,preds,today}){
  const [exp,setExp]=useState({});
  const played=matches.filter(m=>m.hg!==""&&m.hg!=null);
  const upcoming=matches.filter(m=>m.hg===""||m.hg==null);
  if(played.length===0&&upcoming.length===0) return null;
  const last=[...played].sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:b.id-a.id).slice(0,3);
  const next=[...upcoming].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.id-b.id).slice(0,3);
  const names=Object.keys(preds);
  const scorers=(m)=>names.map(id=>({n:preds[id].name||id,pt:matchPoints(preds[id].scores&&preds[id].scores[m.id],m)})).filter(z=>z.pt!=null&&z.pt>0).sort((a,b)=>b.pt-a.pt);
  const predsFor=(m)=>names.map(id=>({n:preds[id].name||id,pr:preds[id].scores&&preds[id].scores[m.id]})).filter(x=>x.pr&&x.pr.h!=="");
  return (<div className="livewrap">
    {last.length>0&&<div className="card">
      <div className="lab" style={{color:"var(--blue2)"}}>Edelliset ottelut</div>
      {last.map(m=>{const sc=scorers(m);return <div key={m.id} className="liverow">
        <div className="row between"><div className="tm">{flag(m.home)} {m.home} <span className="mut">–</span> {flag(m.away)} {m.away}{m.dbl&&<span className="pill dbl" style={{marginLeft:6}}>×2</span>}</div>
          <div className="mono" style={{fontSize:17}}>{m.hg}–{m.ag}</div></div>
        <div className="row wrapf" style={{gap:5,marginTop:5}}>
          <span className="tiny" style={{marginRight:2}}>{dateLabel(m.date,today)} ·</span>
          {sc.length===0?<span className="tiny">ei pisteitä</span>:sc.slice(0,5).map((z,i)=>{const base=m.dbl?z.pt/2:z.pt;const cls=base>=5?"g":base===4?"g2":"y";return <span key={i} className={"pill "+cls}>{z.pt}p {z.n}</span>;})}
        </div></div>;})}
    </div>}
    {next.length>0&&<div className="card">
      <div className="lab" style={{color:"var(--blue2)"}}>Seuraavat ottelut</div>
      {next.map(m=>{const psl=predsFor(m);const open=exp[m.id];const show=open?psl:psl.slice(0,3);const rest=psl.length-show.length;
        return <div key={m.id} className="liverow">
        <div className="row between"><div className="tm">{flag(m.home)} {m.home} <span className="mut">–</span> {flag(m.away)} {m.away}{m.dbl&&<span className="pill dbl" style={{marginLeft:6}}>×2</span>}</div>
          <span className="tiny" style={{color:"var(--teal)",fontWeight:700}}>{dateLabel(m.date,today)}</span></div>
        <div className="row wrapf" style={{gap:6,marginTop:6}}>
          {psl.length===0?<span className="tiny">ei veikkauksia</span>:show.map((x,i)=><span key={i} className="predchip">{x.n} <span className="s">{x.pr.h}-{x.pr.a}</span></span>)}
          {psl.length>3&&<span className="morechip" onClick={()=>setExp(e=>({...e,[m.id]:!open}))}>{open?"▴ vähemmän":"+"+rest+" ▾"}</span>}
        </div></div>;})}
    </div>}
  </div>);
}

/* ===================== VEIKKAAJAN OTTELUKORTTI ===================== */

    <div className="card">
      <button className="ghost" onClick={onBack}>‹ Tulostaulukko</button>
      <div className="row between wrapf" style={{marginTop:10}}>
        <h2 style={{fontSize:26}}>{p.name}</h2>
        <div style={{textAlign:"right"}}><div className="tot" style={{fontSize:28,color:"var(--grn)"}}>{sc.total}</div><div className="tiny">yhteensä</div></div>
      </div>
      <div className="row wrapf" style={{gap:8,marginTop:6}}>
        {[["Alkulohko",sc.mp],["Pelaajat",sc.pp],["Mestari",sc.tp]].map(([l,v])=>
          <span key={l} className="tiny" style={{border:"1px solid var(--line)",borderRadius:13,padding:"5px 10px"}}>{l} {v} p</span>)}
      </div>
      <div className="divider"/>
      <div className="lab">Joukkue</div>
      {POS_ORDER.map(pos=>{const pk=p.picks&&p.picks[pos];const country=pk&&pk.country;const out=country&&teamstats[country]&&teamstats[country].out;
        const pts=(pk&&pk.name)?playerPts(pos,playerstats[pkey(pk.name,pk.country)]):0;
        return <div key={pos} className={"prow"+(out?" out":"")}><span className="poslab">{POS[pos].label}</span>
          <span style={{fontWeight:700}}>{country?<span className="flag">{flag(country)}</span>:null}{(pk&&pk.name)||"—"}</span>
          <span className="mono" style={{color:out?"var(--grey)":"var(--teal)",fontSize:13}}>{out?`+${pts} p · tippunut`:`+${pts} p`}</span></div>;})}
      {(()=>{const t=p.team;const out=t&&teamstats[t]&&teamstats[t].out;const pts=t?teamPoints(t,matches,teamstats):0;
        return <div className={"prow champ"+(out?" out":"")}><span className="poslab">Mestarimaa</span>
          <span style={{fontWeight:700}}>{t?<span className="flag">{flag(t)}</span>:null}{t||"—"}</span>
          <span className="mono" style={{color:out?"var(--grey)":"var(--teal)",fontSize:13}}>{out?`+${pts} p · tippunut`:`+${pts} p`}</span></div>;})()}
    </div>
    {Object.keys(GROUPS).map(g=>{
      const ms=matches.filter(m=>m.group===g);
      return <div className="card" key={g}>
        <div className="section-h" onClick={()=>setOpen(o=>({...o,[g]:!o[g]}))}><span>Lohko {g}</span><span>{open[g]?"–":"+"}</span></div>
        {open[g]&&ms.map(mt=>{
          const pr=p.scores&&p.scores[mt.id]; const played=mt.hg!==""&&mt.hg!=null;
          const pt=matchPoints(pr,mt); const base=(played&&pt!=null)?(mt.dbl?pt/2:pt):null;
          const cls=base==null?"":base>=5?"g":base===4?"g2":base===3?"y":"z";
          return <div key={mt.id} style={{padding:"9px 0",borderBottom:"1px dashed var(--line)"}}>
            <div className="row between">
              <div className="tm">{flag(mt.home)} {mt.home} <span className="mut">–</span> {flag(mt.away)} {mt.away}{mt.dbl&&<span className="pill dbl" style={{marginLeft:6}}>×2</span>}</div>
              {(played&&pt!=null)?<span className={"pill "+cls}>{pt} p</span>:<span className="tiny">–</span>}
            </div>
            <div className="tiny" style={{marginTop:2}}>veikkaus {pr?`${pr.h}–${pr.a}`:"—"} · {played?`tulos ${mt.hg}–${mt.ag}`:"ei vielä pelattu"}</div>
          </div>;
        })}
      </div>;
    })}
  </div>);
}

/* ===================== OTTELUT ===================== */
function Ottelut({matches,preds}){
  const today=todayISO();
  const names=Object.keys(preds).sort((a,b)=>(preds[a].name||"").localeCompare(preds[b].name||"","fi"));
  const dates=useMemo(()=>[...new Set(matches.map(m=>m.date))].sort(),[matches]);
  const defaultDay=useMemo(()=>dates.find(d=>d>=today)||dates[dates.length-1],[dates,today]);
  const [view,setView]=useState("lohko");
  const [open,setOpen]=useState({"A":true});
  const [openDay,setOpenDay]=useState(()=>({[defaultDay]:true}));
  const dayTitle=(ds)=>{ const d=new Date(ds+"T12:00:00"); const f=WD[d.getDay()]+" "+d.getDate()+"."+(d.getMonth()+1)+"."; const rel=dateLabel(ds,today); return rel===f?f:rel+" · "+f; };
  const matchBlock=(mt)=>{
    const done=mt.hg!==""&&mt.ag!==""&&mt.hg!=null&&mt.ag!=null;
    return <div key={mt.id} style={{padding:"10px 0",borderBottom:"1px dashed var(--line)"}}>
      <div className="row between">
        <div className="tm">{flag(mt.home)} {mt.home} <span className="mut">vs</span> {flag(mt.away)} {mt.away}{mt.dbl&&<span className="pill dbl" style={{marginLeft:6}}>×2</span>}</div>
        <div className="mono" style={{fontSize:17}}>{done?`${mt.hg}–${mt.ag}`:"– : –"}</div>
      </div>
      {done&&<div className="row wrapf" style={{gap:6,marginTop:6}}>
        {names.map(id=>{ const pr=preds[id].scores&&preds[id].scores[mt.id]; const pt=matchPoints(pr,mt);
          if(!pr||pr.h===""||pr.a==="") return null;
          const base=mt.dbl?pt/2:pt; const cls=base>=5?"g":base===4?"g2":base===3?"y":"z";
          return <span key={id} className={"pill "+cls}>{preds[id].name||id} {pr.h}-{pr.a} · {pt}p</span>; })}
      </div>}
    </div>;
  };
  return (
    <div>
      <div className="card"><div className="note">Täysosuma 5 p · oikea lopputulos + toisen maalimäärä 4 p · pelkkä lopputulos 3 p · väärin 0 p. Tuplaottelussa ×2.</div>
        <div className="row" style={{gap:10,marginTop:4}}>
          <span className="tiny" style={{fontWeight:700}}>Näkymä:</span>
          <div className="seg">
            <button className={"segb"+(view==="lohko"?" on":"")} onClick={()=>setView("lohko")}>Lohkoittain</button>
            <button className={"segb"+(view==="paiva"?" on":"")} onClick={()=>setView("paiva")}>Päivittäin</button>
          </div>
        </div>
      </div>

      {view==="lohko" && Object.keys(GROUPS).map(g=>(
        <div className="card" key={g}>
          <div className="section-h" onClick={()=>setOpen(o=>({...o,[g]:!o[g]}))}><span>Lohko {g}</span><span>{open[g]?"–":"+"}</span></div>
          {open[g]&&matches.filter(m=>m.group===g).map(matchBlock)}
        </div>
      ))}

      {view==="paiva" && dates.map(ds=>{ const isToday=ds===today; const dms=matches.filter(m=>m.date===ds);
        return <div className="card" key={ds} style={isToday?{borderColor:"#3a47a8"}:null}>
          <div className="section-h" onClick={()=>setOpenDay(o=>({...o,[ds]:!o[ds]}))}>
            <span>{dayTitle(ds)}{isToday&&<span className="todaytag">TÄNÄÄN</span>}</span>
            <span>{openDay[ds]?"–":"+"}</span>
          </div>
          {openDay[ds]&&dms.map(matchBlock)}
        </div>;
      })}
    </div>
  );
}

function Admin({matches,preds,config,teamstats,playerstats}){

function AdminPanel({matches,preds,config,teamstats,playerstats}){

  const saveM=async()=>{ try{await docRef("matches").set({list:mDraft});fl("Tulokset tallennettu");}catch(e){fl("Virhe: "+e.message);} };

  // pelaajatilastot
  const picked=useMemo(()=>{ const map={};
    Object.values(preds).forEach(p=>POS_ORDER.forEach(pos=>{ const pk=p.picks&&p.picks[pos];
      if(pk&&pk.name){ const k=pkey(pk.name,pk.country); (map[k]=map[k]||{name:pk.name,country:pk.country,pos:new Set()}).pos.add(pos);} }));
    return Object.entries(map).map(([k,v])=>({k,...v,pos:[...v.pos]})); },[preds]);
  const [psDraft,setPsDraft]=useState(playerstats);
  useEffect(()=>{setPsDraft(playerstats);},[playerstats]);

  const savePs=async()=>{ try{await docRef("playerstats").set({map:psDraft});fl("Pelaajatilastot tallennettu");}catch(e){fl("Virhe: "+e.message);} };

  // joukkuetilastot + tippuminen

  const champTeams=[...new Set(Object.values(preds).map(p=>p.team).filter(Boolean))];

  // muiden korjaus
  const [editId,setEditId]=useState("");

        {open.elim&&<div>
          <p className="tiny">Merkitse maa tippuneeksi pudotuspelien edetessä → sen pelaajat ja mestari­valinnat näkyvät tulostaulukossa harmaana. Kerätyt pisteet säilyvät.</p>
          {Object.keys(GROUPS).map(g=>(
            <div key={g} style={{marginTop:8}}>
              <div className="tiny" style={{color:"var(--blue2)",fontWeight:800}}>Lohko {g}</div>
              <div className="row wrapf" style={{gap:8,marginTop:4}}>
                {GROUPS[g].map(t=>{ const out=tsDraft[t]&&tsDraft[t].out;
                  return <label key={t} className="row tiny" style={{gap:4,border:"1px solid var(--line)",borderRadius:8,padding:"5px 8px",opacity:out?.6:1}}>
                    <input type="checkbox" checked={!!out} onChange={e=>setTeam(t,"out",e.target.checked)}/><span className="flag">{flag(t)}</span>{t}</label>; })}
              </div>
            </div>
          ))}
          <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveTs}>Tallenna tippumiset</button></div>
        </div>}
      </div>

      {/* KORJAA OSALLISTUJAN VALINTOJA */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,edit:!o.edit}))}><span>Korjaa osallistujan valintoja</span><span>{open.edit?"–":"+"}</span></div>
        {open.edit&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={editId} onChange={e=>e.target.value?startEdit(e.target.value):setEditDraft(null)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{preds[id].name||id}</option>)}
            </select>
          </div>
          {editDraft&&<div style={{marginTop:12}}>
            <TeamPicker value={editDraft} onChange={setEditDraft} disabled={false} playerstats={playerstats} showPts={false}/>
            <div style={{textAlign:"center",marginTop:12}}><button className="act" onClick={saveEdit}>Tallenna korjaus</button></div>
            <p className="tiny">Huom: tämä korjaa pelaaja- ja mestarivalinnat. Otteluveikkaukset osallistuja korjaa itse (ennen lukitusta).</p>
          </div>}
        </div>}
      </div>

      {/* NOLLAA PELAAJAN PIN */}
      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,pin:!o.pin}))}><span>Nollaa pelaajan PIN</span><span>{open.pin?"–":"+"}</span></div>
        {open.pin&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={resetId} onChange={e=>setResetId(e.target.value)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{(preds[id].name||id)+(preds[id].pin?" 🔒":"")}</option>)}
            </select>
            <button className="ghost" disabled={!resetId} onClick={doResetPin}>Nollaa PIN</button>
          </div>
          <p className="tiny">🔒 = veikkaajalla on PIN asetettuna. Jos pelaaja unohtaa PIN-koodinsa, nollaa se tästä — sen jälkeen veikkauksen voi avata ilman PIN:iä (ja asettaa uuden).</p>
        </div>}
      </div>

      <div className="card">
        <div className="section-h" onClick={()=>setOpen(o=>({...o,del:!o.del}))}><span>Poista veikkaaja</span><span>{open.del?"–":"+"}</span></div>
        {open.del&&<div>
          <div className="row wrapf" style={{gap:8}}>
            <select value={delId} onChange={e=>setDelId(e.target.value)}>
              <option value="">— valitse osallistuja —</option>
              {Object.keys(preds).map(id=><option key={id} value={id}>{preds[id].name||id}</option>)}
            </select>
            <button className="ghost" style={{borderColor:"var(--red)",color:"var(--red)"}} disabled={!delId} onClick={doDelete}>Poista valittu</button>
          </div>
          <p className="tiny">Poistaa veikkaajan rivin pysyvästi (esim. testirivi tai kahteen kertaan tullut). Tätä ei voi perua.</p>
        </div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
